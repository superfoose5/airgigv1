<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0f" />
<link rel="manifest" href="/manifest.webmanifest" />
<title>AirGig</title>
<style>
  :root {
    --bg: #0a0a0f;
    --string: #c8a850;
    --string-hot: #fff5d6;
    --accent: #e91e8c;
    --surface: #1a1a2e;
    --text: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* Top: chord name */
  #chord-name-wrap {
    flex: 0 0 15%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: env(safe-area-inset-top, 0);
  }
  #chord-name {
    font-size: clamp(80px, 22vw, 160px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fff;
    transition: transform 90ms cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
    text-shadow: 0 0 24px rgba(255,255,255,0.08);
  }
  #chord-name.hit { transform: scale(1.1); }

  /* Middle: guitar visual */
  #guitar-wrap {
    flex: 1 1 60%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #guitar {
    width: 100%;
    height: 100%;
    display: block;
  }
  #flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(255,180,80,0.35) 0%, transparent 60%);
    transition: opacity 180ms ease-out;
    will-change: opacity;
  }
  #flash.up { background: radial-gradient(ellipse at center, rgba(200,230,255,0.32) 0%, transparent 60%); }

  /* Bottom: chord selector */
  #chord-bar {
    flex: 0 0 25%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 10px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #chord-bar::-webkit-scrollbar { display: none; }
  .chord-btn {
    flex: 0 0 auto;
    min-width: 64px;
    height: 64px;
    padding: 0 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    background: var(--surface);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 100ms ease, background 160ms ease, box-shadow 160ms ease;
    cursor: pointer;
  }
  .chord-btn:active { transform: scale(0.94); }
  .chord-btn.active {
    background: var(--accent);
    box-shadow: 0 0 24px rgba(233, 30, 140, 0.45), inset 0 0 0 1px rgba(255,255,255,0.15);
  }
  .chord-btn.pattern-btn {
    background: linear-gradient(135deg, #2a1838 0%, #1a1a2e 100%);
    color: #c8a850;
    letter-spacing: 0.12em;
    font-size: 14px;
    padding: 0 14px;
  }
  .chord-btn.pattern-btn.active {
    background: linear-gradient(135deg, #c8a850 0%, #e9b820 100%);
    color: #0a0a0f;
    box-shadow: 0 0 24px rgba(200,168,80,0.55), inset 0 0 0 1px rgba(0,0,0,0.15);
  }

  /* Start overlay */
  #start-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #14141f 0%, #07070b 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    flex-direction: column;
    gap: 18px;
  }
  #start-overlay h1 {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #fff 0%, #c8a850 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #start-overlay p {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
  }
  #start-btn {
    padding: 18px 40px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    box-shadow: 0 10px 40px rgba(233, 30, 140, 0.4);
    cursor: pointer;
  }
  #start-btn:active { transform: scale(0.97); }
  .hidden { display: none !important; }


  /* Hidden sensitivity panel */
  #sens-panel {
    position: absolute;
    top: 16%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 30, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 14px 20px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 30;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 240px;
  }
  #sens-panel label { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; text-transform: uppercase; }
  #sens-panel input[type=range] { width: 100%; accent-color: var(--accent); }
  #sens-panel .row { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.45); }

  /* Palm mute indicator */
  #mute-indicator {
    position: absolute;
    top: calc(16% + 12px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 220ms ease;
    pointer-events: none;
  }
  #mute-indicator.on { opacity: 1; color: #ff8a4c; }

  /* Motion status dot */
  #motion-dot {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    right: 12px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 80ms ease, transform 80ms ease;
    z-index: 25;
    pointer-events: none;
  }
  #motion-dot.live { background: #2bd47a; }
  #motion-dot.hit { background: #ffcc4c; transform: scale(1.8); }

  #debug-readout {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 6px);
    left: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    z-index: 25;
    pointer-events: none;
    letter-spacing: 0.04em;
    display: none;
  }
  #debug-readout.visible { display: block; }
  #motion-dot { display: none; }
  #motion-dot.visible { display: block; }
</style>
</head>
<body>
<div id="app">
  <div id="chord-name-wrap">
    <div id="chord-name">G</div>
  </div>
  <div id="mute-indicator">PALM MUTE</div>
  <div id="motion-dot"></div>
  <div id="debug-readout">peak: 0.00 | thr: 0.30</div>
  <div id="guitar-wrap">
    <canvas id="guitar"></canvas>
    <div id="flash"></div>
  </div>
  <div id="chord-bar"></div>

  <div id="start-overlay">
    <h1>AirGig</h1>
    <p>Hold like a guitar neck. Strum your wrist.</p>
    <button id="start-btn">TAP TO START</button>
  </div>

  <div id="sens-panel" class="hidden">
    <label>SENSITIVITY</label>
    <input type="range" id="sens-slider" min="0.2" max="3.0" step="0.05" value="0.7" />
    <div class="row"><span>SUBTLE</span><span>STRONG</span></div>
  </div>
</div>

<script>
/* ============================================================
   AIR-GIG — Strum Experience Prototype  (v2 — full overhaul)

   Architecture:
   - Web Audio clock scheduling (no setTimeout for audio)
   - Single state-machine detector: rising-edge | local-peak | hard-surge
   - Cooldowns: 45ms same-dir, 0ms reversal
   - Asymmetric threshold: up = down × 1.8
   - Sweep cap: ~16ms fast → ~120ms slow (gesture-mapped, capped)
   - Cached pick-noise buffers (allocated once)
   - 5 partials per string
   - Orientation-based debounced palm mute
   - Debug readout hidden by default (triple-tap chord name to reveal)
   ============================================================ */

const NOTE = {
  'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,
  'A#2':116.54,'B2':123.47,'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,
  'E3':164.81,'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,
  'A#3':233.08,'B3':246.94,'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,
  'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00
};

const CHORDS = {
  G:  ['G2','B2','D3','G3','B3','G4'],
  C:  ['x', 'C3','E3','G3','C4','E4'],
  D:  ['x', 'x', 'D3','A3','D4','F#4'],
  Em: ['E2','B2','E3','G3','B3','E4'],
  Am: ['x', 'A2','E3','A3','C4','E4'],
  E:  ['E2','G#2','B2','E3','G#3','B3'],
  A:  ['x', 'A2','E3','A3','C#4','E4'],
  F:  ['F2','C3','F3','A3','C4','F4'],
  Dm: ['x', 'x', 'D3','A3','D4','F4'],
  Bm: ['x', 'B2','D3','F#3','B3','D4'],
  // Power chords for pattern mode (root, 5th, octave on bottom 3 strings)
  F5:  ['F2','C3','F3','x','x','x'],
  Bb5: ['A#2','F3','A#3','x','x','x'],
  Ab5: ['G#2','D#3','G#3','x','x','x'],
  Db5: ['C#3','G#3','C#4','x','x','x'],
};
const CHORD_ORDER = ['G','C','D','Em','Am','E','A','F','Dm','Bm'];
const PATTERN = ['F5','Bb5','Ab5','Db5'];

const DETECT = {
  minCooldownMs: 45,
  reversalCooldownMs: 0,
  rearmRatio: 0.28,
  upRatio: 1.8,            // up threshold = down × 1.8 (softened from 3×)
  pickNoiseCache: {},      // muted/normal noise buffers — built once
};

let state = {
  ctx: null,
  master: null,
  currentChord: 'G',
  activeVoices: [],
  sensitivity: 0.7,        // tuned default
  upSensitivity: 0.7 * DETECT.upRatio,
  calibratedPeak: 2.5,
  palmMute: false,
  motionEnabled: false,
  patternMode: false,
  patternIndex: 0,
};

let hasStarted = false;

/* ===== AUDIO GRAPH =====
   The AudioContext itself is created synchronously inside the start() gesture
   handler (required by iOS Safari). This function builds the rest of the graph. */
async function finishAudioGraph() {
  const ctx = state.ctx;

  // Master chain: voices -> bodyEQ -> compressor -> [dry + reverb] -> destination
  const master = ctx.createGain();
  master.gain.value = 0.8;

  // Body EQ chain
  const lowBody = ctx.createBiquadFilter();
  lowBody.type = 'peaking'; lowBody.frequency.value = 100; lowBody.Q.value = 0.7; lowBody.gain.value = 5;
  const midBody = ctx.createBiquadFilter();
  midBody.type = 'peaking'; midBody.frequency.value = 220; midBody.Q.value = 0.8; midBody.gain.value = 4;
  const air = ctx.createBiquadFilter();
  air.type = 'highshelf'; air.frequency.value = 3200; air.gain.value = 1.5;
  const tame = ctx.createBiquadFilter();
  tame.type = 'lowpass'; tame.frequency.value = 8000; tame.Q.value = 0.5;

  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.18; comp.knee.value = 6;

  // Reverb
  const conv = ctx.createConvolver();
  conv.buffer = makeImpulseResponse(ctx, 0.9, 2.4);
  const wet = ctx.createGain(); wet.gain.value = 0.18;
  const dry = ctx.createGain(); dry.gain.value = 1.0;

  master.connect(lowBody).connect(midBody).connect(air).connect(tame).connect(comp);
  comp.connect(dry).connect(ctx.destination);
  comp.connect(conv).connect(wet).connect(ctx.destination);

  state.master = master;
  state.reverbWet = wet;
  state.reverbDry = dry;
  state.comp = comp;
}

function makeImpulseResponse(ctx, durationSec, decay) {
  const rate = ctx.sampleRate;
  const len = Math.floor(rate * durationSec);
  const ir = ctx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
    }
  }
  return ir;
}

/* ===== STRING SYNTHESIS =====
   Additive synthesis: 5 partials per string with inharmonic stretch.
   All audio scheduled via Web Audio clock (no setTimeout) for sample-accurate
   timing. Pick noise is cached at startup so we never allocate per-strum. */

function buildPickNoiseBuffers(ctx) {
  // Two buffer flavors: normal click and muted thump.
  ['normal', 'muted'].forEach((kind) => {
    const muted = kind === 'muted';
    const durSec = muted ? 0.07 : 0.018;
    const len = Math.floor(ctx.sampleRate * durSec);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, muted ? 1.5 : 2);
    }
    DETECT.pickNoiseCache[kind] = buf;
  });
}

function playPickClickAt(when, intensity, isUp, panValue, muted = false) {
  const ctx = state.ctx;
  const buf = DETECT.pickNoiseCache[muted ? 'muted' : 'normal'];
  if (!buf) return;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const hp = ctx.createBiquadFilter();
  hp.type = muted ? 'lowpass' : 'highpass';
  hp.frequency.value = muted ? 240 : (1600 + intensity * 1800 + (isUp ? 400 : 0));
  hp.Q.value = 0.7;
  const g = ctx.createGain();
  g.gain.value = (muted ? 0.7 : 0.32) * (0.5 + intensity * 0.8);
  const pan = ctx.createStereoPanner();
  pan.pan.value = panValue;
  src.connect(hp).connect(g).connect(pan).connect(state.master);
  src.start(when);
  src.stop(when + buf.duration + 0.02);
}

function playStringAt(when, freq, intensity, isUp, panValue, isMuted, stringIndex, sustainMult = 1.0) {
  const ctx = state.ctx;

  if (isMuted || freq === null) {
    playPickClickAt(when, 0.6 * intensity, isUp, panValue, true);
    return null;
  }

  const voice = ctx.createGain();
  voice.gain.value = 0;
  const pan = ctx.createStereoPanner();
  pan.pan.value = panValue;

  const detune = (Math.random() * 6 - 3);
  const freqAdj = freq * Math.pow(2, detune / 1200);

  const tone = ctx.createBiquadFilter();
  tone.type = 'lowpass';
  const cutoff = 1800 + intensity * 5200 + (isUp ? 600 : 0);
  tone.frequency.value = Math.min(cutoff, 9500);
  tone.Q.value = 0.4;

  const numPartials = 5; // reduced from 8 to cut per-strum CPU ~38%
  const baseSustain = 2.5 + intensity * 1.0;
  const decayScale = 1.0 - (stringIndex / 6) * 0.45;
  const sustain = baseSustain * decayScale * sustainMult;

  const partials = [];
  for (let p = 1; p <= numPartials; p++) {
    const inh = 1 + (p * p) * 0.00035;
    const partialFreq = freqAdj * p * inh;
    if (partialFreq > ctx.sampleRate * 0.45) continue;

    const osc = ctx.createOscillator();
    osc.type = p === 1 ? 'triangle' : 'sine';
    osc.frequency.value = partialFreq;

    const g = ctx.createGain();
    const partialAmp = 1 / Math.pow(p, 1.35);
    const upBoost = isUp ? (1 + (p - 1) * 0.05) : 1;
    const targetAmp = partialAmp * upBoost * 0.4;
    const partialDecay = sustain / Math.pow(p, 0.55);

    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(targetAmp, when + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, when + Math.max(0.05, partialDecay));

    osc.connect(g).connect(tone);
    osc.start(when);
    osc.stop(when + partialDecay + 0.1);
    partials.push({ osc, g });
  }

  const peakGain = 0.85 * (isUp ? 0.8 : 1.0) * (0.45 + intensity * 0.7);
  voice.gain.setValueAtTime(0, when);
  voice.gain.linearRampToValueAtTime(peakGain, when + 0.005);
  voice.gain.exponentialRampToValueAtTime(0.0001, when + sustain);

  tone.connect(voice).connect(pan).connect(state.master);

  return {
    voice, partials, endTime: when + sustain + 0.1,
    stop(fadeSec = 0.015) {
      const t = ctx.currentTime;
      try {
        voice.gain.cancelScheduledValues(t);
        voice.gain.setValueAtTime(voice.gain.value, t);
        voice.gain.linearRampToValueAtTime(0.0001, t + fadeSec);
      } catch (e) {}
      for (const p of partials) {
        try { p.osc.stop(t + fadeSec + 0.02); } catch (e) {}
      }
    }
  };
}

/* ===== STRUM ENGINE =====
   All audio is scheduled on the Web Audio clock. Visual / haptic side effects
   stay on the main thread but happen on the same JS tick the detector fires.

   Sweep mapping (capped):
     fast (rise <= 30ms)  → ~12ms sweep   (~2ms gap, snappy chop)
     med  (rise ~80ms)    → ~40ms sweep   (~7ms gap, natural strum)
     slow (rise >= 300ms) → ~120ms sweep  (~20ms gap, deliberate arpeggio)
*/
function strum(direction, intensity, riseDurationMs = 60, gestureEnergy = 1) {
  if (!state.ctx) return;
  intensity = Math.max(0, Math.min(1, intensity));

  // Pattern mode: advance chord BEFORE we play it
  advancePatternIfActive(direction);

  // Cut previous chord cleanly
  cutPreviousVoices(0.015);

  const isUp = direction < 0;
  const chord = CHORDS[state.currentChord];
  const muted = state.palmMute;
  const ctx = state.ctx;

  // Sweep duration — capped so a slow gesture stretches the strum without
  // turning it into mush. Spec target: 8–14ms. We extend to 120ms for
  // expressive slow-arpeggio feel but cap there.
  const riseClamped = Math.max(15, Math.min(300, riseDurationMs));
  const riseNorm = (riseClamped - 15) / (300 - 15);
  const riseCurve = Math.pow(riseNorm, 0.85);
  let totalSweepMs = 12 + riseCurve * 108;       // 12ms..120ms
  totalSweepMs *= (1.0 - intensity * 0.20);      // harder = slightly tighter
  const stringGapSec = (totalSweepMs / 5) / 1000; // 5 gaps between 6 strings

  // Order: down = low→high, up = high→low
  const order = isUp ? [5, 4, 3, 2, 1, 0] : [0, 1, 2, 3, 4, 5];

  // Sustain: speed dominates for short strums, gesture length adds tail for slow ones.
  const energyNorm = Math.min(1, gestureEnergy / 80);
  const speedBoost = Math.pow(intensity, 0.7);
  const riseBoost = Math.min(1, riseDurationMs / 300);
  const sustainMult = 1.0 + speedBoost * 1.2 + energyNorm * 0.8 + riseBoost * 0.5;
  // range ≈ 1.0..3.5

  // Pre-roll the Web Audio clock by a tiny lookahead so all events are scheduled
  // in the future (avoids missed events when ctx.currentTime advances mid-call).
  const baseTime = ctx.currentTime + 0.003;

  for (let seq = 0; seq < order.length; seq++) {
    const stringIdx = order[seq];
    const noteName = chord[stringIdx];
    const isMutedNote = noteName === 'x';
    const freq = isMutedNote ? null : NOTE[noteName];
    const gainJitter = 0.95 + Math.random() * 0.1;
    const stringIntensity = intensity * gainJitter;
    const panValue = -0.15 + (stringIdx / 5) * 0.30;

    // Tiny per-string timing jitter — bounded so it never collapses the sweep
    const jitterSec = (Math.random() * 2 - 1) * Math.min(0.0006, stringGapSec * 0.2);
    const when = baseTime + seq * stringGapSec + jitterSec;

    playPickClickAt(when, stringIntensity * 0.55, isUp, panValue, muted);
    const v = playStringAt(
      when, freq, stringIntensity, isUp, panValue,
      isMutedNote || muted, stringIdx, sustainMult
    );
    if (v) state.activeVoices.push(v);

    // Visual trigger — main thread, slight delay to match audio
    const visualDelayMs = Math.max(0, (when - ctx.currentTime) * 1000);
    if (visualDelayMs < 4) {
      triggerStringVisual(stringIdx, stringIntensity, isUp);
    } else {
      setTimeout(() => triggerStringVisual(stringIdx, stringIntensity, isUp), visualDelayMs);
    }
  }

  // Lead pick click at the front of the sweep
  const leadClickIntensity = intensity * (0.6 + (1 - riseNorm) * 0.4);
  playPickClickAt(baseTime, leadClickIntensity, isUp, isUp ? 0.15 : -0.15, muted);

  if (navigator.vibrate) {
    navigator.vibrate(intensity > 0.7 ? 18 : 12);
  }

  flashGuitar(isUp, intensity);
  chordNameHit();
}

function cutPreviousVoices(fadeSec) {
  const now = state.ctx.currentTime;
  for (const v of state.activeVoices) {
    if (v && v.endTime > now) v.stop(fadeSec);
  }
  // Trim ended voices
  state.activeVoices = state.activeVoices.filter(v => v && v.endTime > now);
}

/* ===== MOTION DETECTION ===== */
const motion = {
  ema: 0,
  history: [],          // {t, v}
  lastFireT: 0,
  lastFireDir: 0,
  armed: true,
  gestureStartT: 0,
  gestureStartV: 0,
  gestureEnergy: 0,
  // Orientation-based palm mute (debounced)
  orientBeta: 0,
  tiltCandidateSince: 0,
};

function onDeviceMotion(e) {
  const acc = e.accelerationIncludingGravity || e.acceleration;
  const accLin = e.acceleration;
  const rot = e.rotationRate || {};
  if (!acc && !rot) return;

  const dot = document.getElementById('motion-dot');
  if (dot && !dot.classList.contains('live')) dot.classList.add('live');

  const betaRate = rot.beta || 0;
  const gammaRate = rot.gamma || 0;
  const alphaRate = rot.alpha || 0;
  const linY = accLin ? (accLin.y || 0) : 0;
  const linZ = accLin ? (accLin.z || 0) : 0;

  const signedVelocity =
    (betaRate / 120) +
    (gammaRate / 160) +
    (linY / 4) -
    (linZ / 6) +
    (alphaRate / 240);

  motion.ema = motion.ema * 0.12 + signedVelocity * 0.88;

  const now = performance.now();
  motion.history.push({ t: now, v: motion.ema });
  while (motion.history.length > 8) motion.history.shift();

  detectStrum();
}

function detectStrum() {
  if (motion.history.length < 3) return;
  const last = motion.history[motion.history.length - 1];
  const prev = motion.history[motion.history.length - 2];
  const prev2 = motion.history[motion.history.length - 3];
  const now = performance.now();

  const v = last.v;
  const absV = Math.abs(v);
  const dir = Math.sign(v);
  if (!dir) return;

  const threshold = dir > 0 ? state.sensitivity : state.upSensitivity;
  const lastDir = motion.lastFireDir || 0;
  const reversing = !!lastDir && dir !== lastDir;

  // Cooldown: 45ms same-dir, 0ms reversal.
  const cooldown = reversing ? DETECT.reversalCooldownMs : DETECT.minCooldownMs;
  if (now - motion.lastFireT < cooldown) return;

  // Re-arm: reversal always rearms; same-direction needs signal to fall.
  if (!motion.armed) {
    if (reversing || absV < threshold * DETECT.rearmRatio) {
      motion.armed = true;
    } else {
      return;
    }
  }

  // Track gesture start (for sweep/sustain mapping)
  const riseThresh = threshold * 0.3;
  if (absV > riseThresh) {
    if (motion.gestureStartT === 0 || Math.sign(motion.gestureStartV) !== dir) {
      motion.gestureStartT = last.t;
      motion.gestureStartV = v;
      motion.gestureEnergy = 0;
    }
    motion.gestureEnergy += absV;
  }

  // ----- Three fire conditions, in priority order -----

  // 1) Rising edge — fires at the FIRST sample over threshold.
  //    Critical for slow strums: sound starts when the gesture starts,
  //    not 200–400ms later at the velocity peak.
  let peakV = null;
  if (absV >= threshold && Math.abs(prev.v) < threshold) {
    peakV = v;
  }

  // 2) True local peak at the previous sample.
  if (peakV === null) {
    const prevAbs = Math.abs(prev.v);
    const isLocalPeak =
      Math.sign(prev.v) === dir &&
      prevAbs >= Math.abs(prev2.v) &&
      prevAbs > absV &&
      prevAbs >= threshold;
    if (isLocalPeak) peakV = prev.v;
  }

  // 3) Hard surge — short flicks where we never see a clean peak.
  if (peakV === null) {
    if (absV >= threshold * 1.55 && absV > Math.abs(prev.v) * 1.25) {
      peakV = v;
    }
  }

  if (peakV === null) return;

  motion.lastFireT = now;
  motion.lastFireDir = Math.sign(peakV);
  motion.armed = false;

  const mag = Math.abs(peakV);
  const intensity = Math.min(1, Math.max(0.2, mag / Math.max(state.calibratedPeak, 1.0)));

  const riseDuration = motion.gestureStartT > 0
    ? Math.max(15, Math.min(400, now - motion.gestureStartT))
    : 50;
  const gestureEnergy = motion.gestureEnergy;

  motion.gestureStartT = 0;
  motion.gestureStartV = 0;
  motion.gestureEnergy = 0;

  strum(peakV > 0 ? 1 : -1, intensity, riseDuration, gestureEnergy);

  const dot = document.getElementById('motion-dot');
  if (dot && dot.classList.contains('visible')) {
    dot.classList.add('hit');
    setTimeout(() => dot.classList.remove('hit'), 90);
  }
}

/* Orientation-based palm mute: requires sustained forward tilt (~120ms) so
   transient acceleration during normal strums never triggers it. */
function onDeviceOrientation(e) {
  if (!state.motionEnabled) return;
  const beta = e.beta || 0;
  motion.orientBeta = beta;

  const forwardTilt = beta > 35;
  const now = performance.now();
  if (forwardTilt) {
    if (!motion.tiltCandidateSince) motion.tiltCandidateSince = now;
    if (now - motion.tiltCandidateSince > 120 && !state.palmMute) {
      state.palmMute = true;
      document.getElementById('mute-indicator').classList.add('on');
    }
  } else {
    motion.tiltCandidateSince = 0;
    if (state.palmMute) {
      state.palmMute = false;
      document.getElementById('mute-indicator').classList.remove('on');
    }
  }
}

/* ===== TOUCH FALLBACK ===== */
function setupTouchFallback() {
  const target = document.getElementById('guitar-wrap');
  let startY = null, startT = 0;
  const begin = (y) => { startY = y; startT = performance.now(); };
  const end = (y) => {
    if (startY === null) return;
    const dy = y - startY;
    const dt = Math.max(1, performance.now() - startT);
    const speed = Math.abs(dy) / dt; // px/ms
    if (Math.abs(dy) < 14) { startY = null; return; }
    const intensity = Math.min(1, speed / 1.6);
    const direction = dy > 0 ? 1 : -1;
    strum(direction, Math.max(0.25, intensity));
    startY = null;
  };
  target.addEventListener('touchstart', (e) => begin(e.touches[0].clientY), { passive: true });
  target.addEventListener('touchend', (e) => end(e.changedTouches[0].clientY), { passive: true });
  target.addEventListener('mousedown', (e) => begin(e.clientY));
  target.addEventListener('mouseup', (e) => end(e.clientY));
}

/* ===== VISUALS ===== */
const canvas = document.getElementById('guitar');
const gctx = canvas.getContext('2d');
let DPR = Math.min(2, window.devicePixelRatio || 1);
let strings = []; // { y, vibAmp, vibPhase, hot }

function resizeCanvas() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  const wrap = document.getElementById('guitar-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  layoutStrings();
}
function layoutStrings() {
  const h = canvas.height;
  strings = [];
  const margin = h * 0.18;
  const usable = h - margin * 2;
  for (let i = 0; i < 6; i++) {
    strings.push({
      y: margin + (usable * (i / 5)),
      vibAmp: 0,
      vibPhase: 0,
      vibStart: 0,
      hot: 0,
    });
  }
}

function triggerStringVisual(idx, intensity, isUp) {
  const s = strings[idx];
  if (!s) return;
  s.vibAmp = 10 + intensity * 22;
  s.vibStart = performance.now();
  s.vibPhase = isUp ? Math.PI : 0;
  s.hot = 1;
}

function drawGuitar() {
  const w = canvas.width, h = canvas.height;
  gctx.clearRect(0, 0, w, h);

  // Sound hole
  const cx = w / 2, cy = h / 2;
  const holeR = Math.min(w, h) * 0.18;
  const grad = gctx.createRadialGradient(cx, cy, holeR * 0.2, cx, cy, holeR);
  grad.addColorStop(0, '#000');
  grad.addColorStop(0.6, '#08080d');
  grad.addColorStop(1, 'rgba(20,18,28,0.0)');
  gctx.fillStyle = grad;
  gctx.beginPath();
  gctx.ellipse(cx, cy, holeR, holeR * 1.05, 0, 0, Math.PI * 2);
  gctx.fill();

  // Rosette ring
  gctx.strokeStyle = 'rgba(200,168,80,0.18)';
  gctx.lineWidth = 2 * DPR;
  gctx.beginPath();
  gctx.ellipse(cx, cy, holeR * 1.12, holeR * 1.18, 0, 0, Math.PI * 2);
  gctx.stroke();

  // Strings
  const now = performance.now();
  for (let i = 0; i < strings.length; i++) {
    const s = strings[i];
    const baseThickness = (0.6 + (5 - i) * 0.4) * DPR;
    const age = (now - s.vibStart) / 1000;
    const lifetime = 0.5;
    let amp = 0;
    if (s.vibStart > 0 && age < lifetime) {
      amp = s.vibAmp * (1 - age / lifetime);
    } else {
      s.vibAmp = 0;
    }
    s.hot *= 0.92;

    const segments = 60;
    gctx.beginPath();
    for (let k = 0; k <= segments; k++) {
      const x = (k / segments) * w;
      const wave = Math.sin((k / segments) * Math.PI) * amp * Math.sin(age * 60 + s.vibPhase);
      const y = s.y + wave * DPR;
      if (k === 0) gctx.moveTo(x, y);
      else gctx.lineTo(x, y);
    }
    // Color: warm gold to hot white
    const heat = Math.min(1, s.hot + amp * 0.02);
    const r = Math.floor(200 + heat * 55);
    const gg = Math.floor(168 + heat * 87);
    const b = Math.floor(80 + heat * 175);
    gctx.strokeStyle = `rgba(${r},${gg},${b},${0.85})`;
    gctx.lineWidth = baseThickness;
    gctx.shadowBlur = heat * 12;
    gctx.shadowColor = `rgba(255,220,150,${heat * 0.6})`;
    gctx.stroke();
    gctx.shadowBlur = 0;
  }

  requestAnimationFrame(drawGuitar);
}

function flashGuitar(isUp, intensity) {
  const el = document.getElementById('flash');
  el.classList.toggle('up', isUp);
  el.style.opacity = (0.4 + intensity * 0.6).toFixed(2);
  // Fade out
  setTimeout(() => { el.style.opacity = '0'; }, 60);
}

function chordNameHit() {
  const el = document.getElementById('chord-name');
  el.classList.remove('hit');
  // restart animation
  void el.offsetWidth;
  el.classList.add('hit');
  setTimeout(() => el.classList.remove('hit'), 110);
}

/* ===== CHORD BAR ===== */
function buildChordBar() {
  const bar = document.getElementById('chord-bar');
  bar.innerHTML = '';

  // Pattern toggle (auto-cycles F5→Bb5→Ab5→Db5 on each downstrum)
  const pb = document.createElement('button');
  pb.className = 'chord-btn pattern-btn' + (state.patternMode ? ' active' : '');
  pb.textContent = 'PATTERN';
  pb.addEventListener('click', togglePattern);
  pb.addEventListener('touchstart', (e) => { e.preventDefault(); togglePattern(); }, { passive: false });
  bar.appendChild(pb);

  CHORD_ORDER.forEach((name) => {
    const b = document.createElement('button');
    b.className = 'chord-btn' + (name === state.currentChord && !state.patternMode ? ' active' : '');
    b.textContent = name;
    b.addEventListener('click', () => selectChord(name));
    b.addEventListener('touchstart', (e) => { e.preventDefault(); selectChord(name); }, { passive: false });
    bar.appendChild(b);
  });
}
function selectChord(name) {
  // Manually picking a chord disables pattern mode
  if (state.patternMode) {
    state.patternMode = false;
    document.querySelector('.pattern-btn')?.classList.remove('active');
  }
  state.currentChord = name;
  document.getElementById('chord-name').textContent = name;
  document.querySelectorAll('.chord-btn').forEach((el) => {
    if (el.classList.contains('pattern-btn')) return;
    el.classList.toggle('active', el.textContent === name);
  });
}
function togglePattern() {
  state.patternMode = !state.patternMode;
  const btn = document.querySelector('.pattern-btn');
  btn.classList.toggle('active', state.patternMode);
  if (state.patternMode) {
    state.patternIndex = 0;
    setCurrentChordSilently(PATTERN[0]);
    // Clear highlight from regular chord buttons
    document.querySelectorAll('.chord-btn').forEach((el) => {
      if (el.classList.contains('pattern-btn')) return;
      el.classList.remove('active');
    });
  }
}
function setCurrentChordSilently(name) {
  state.currentChord = name;
  document.getElementById('chord-name').textContent = name;
}
function advancePatternIfActive(direction) {
  // Advance on downstrums only (direction === 1). Upstrums keep the current chord.
  if (!state.patternMode || direction !== 1) return;
  state.patternIndex = (state.patternIndex + 1) % PATTERN.length;
  setCurrentChordSilently(PATTERN[state.patternIndex]);
}

/* ===== HIDDEN SENSITIVITY PANEL =====
   Triple-tap the chord name reveals:
     - sensitivity slider (updates upSensitivity too)
     - the diagnostic debug readout + motion dot
*/
function setupSensitivityPanel() {
  const name = document.getElementById('chord-name');
  const panel = document.getElementById('sens-panel');
  const slider = document.getElementById('sens-slider');
  const readout = document.getElementById('debug-readout');
  const dot = document.getElementById('motion-dot');

  let taps = 0, lastTap = 0;
  name.addEventListener('click', () => {
    const now = performance.now();
    if (now - lastTap > 500) taps = 0;
    lastTap = now;
    taps++;
    if (taps >= 3) {
      panel.classList.toggle('hidden');
      const showDiag = !panel.classList.contains('hidden');
      readout.classList.toggle('visible', showDiag);
      dot.classList.toggle('visible', showDiag);
      taps = 0;
    }
  });

  slider.addEventListener('input', () => {
    state.sensitivity = parseFloat(slider.value);
    state.upSensitivity = state.sensitivity * DETECT.upRatio;
  });
}

let _peakSeen = 0;
function startDebugReadout() {
  const el = document.getElementById('debug-readout');
  setInterval(() => {
    const v = Math.abs(motion.ema);
    if (v > _peakSeen) _peakSeen = v;
    _peakSeen *= 0.985;
    el.textContent = `peak: ${_peakSeen.toFixed(2)} | now: ${v.toFixed(2)} | thr: ${state.sensitivity.toFixed(2)}`;
  }, 80);
}

/* ===== INIT ===== */
async function start(e) {
  // Guard against double-fire. The start button is INSIDE the overlay, so a
  // click on the button bubbles up — without this guard, start() ran twice
  // and created two AudioContexts + two motion listener sets, which is the
  // most plausible explanation for the "audio not attached to every stroke"
  // feel observed in the demo video.
  if (e) { e.preventDefault(); e.stopPropagation(); }
  if (hasStarted) return;
  hasStarted = true;

  // CRITICAL: on iOS Safari, both DeviceMotionEvent.requestPermission() AND
  // AudioContext creation must happen synchronously inside the user-gesture
  // handler. Don't await anything before these calls.
  const AC = window.AudioContext || window.webkitAudioContext;
  state.ctx = new AC({ latencyHint: 'interactive' });

  let motionPromise = null;
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    motionPromise = DeviceMotionEvent.requestPermission();
  }
  let orientPromise = null;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    orientPromise = DeviceOrientationEvent.requestPermission();
  }

  document.getElementById('start-overlay').classList.add('hidden');

  if (state.ctx.state === 'suspended') {
    try { await state.ctx.resume(); } catch (err) {}
  }

  await finishAudioGraph();
  buildPickNoiseBuffers(state.ctx);

  buildChordBar();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  requestAnimationFrame(drawGuitar);
  setupTouchFallback();
  setupSensitivityPanel();
  startDebugReadout();

  let motionGranted = true;
  try {
    if (motionPromise) {
      const r = await motionPromise;
      motionGranted = (r === 'granted');
    }
    if (orientPromise) await orientPromise;
  } catch (err) { motionGranted = false; }

  if (motionGranted) {
    window.addEventListener('devicemotion', onDeviceMotion, { passive: true });
    window.addEventListener('deviceorientation', onDeviceOrientation, { passive: true });
    state.motionEnabled = true;
  } else {
    const readout = document.getElementById('debug-readout');
    if (readout) readout.textContent = 'Motion denied — use touch';
  }

  if ('serviceWorker' in navigator) {
    try { navigator.serviceWorker.register('/sw.js'); } catch (err) {}
  }
}

// pointerdown + { once: true } + stopPropagation = exactly one start() call,
// even when the user taps the button inside the overlay.
const startBtn = document.getElementById('start-btn');
const startOverlay = document.getElementById('start-overlay');
startBtn.addEventListener('pointerdown', start, { once: true });
startOverlay.addEventListener('pointerdown', start, { once: true });

// Prevent iOS scrolling/zoom
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>

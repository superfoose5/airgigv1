<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0f" />
<link rel="manifest" href="/manifest.webmanifest" />
<title>AirGig</title>
<style>
  :root {
    --bg: #0a0a0f;
    --string: #c8a850;
    --string-hot: #fff5d6;
    --accent: #e91e8c;
    --surface: #1a1a2e;
    --text: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* Top: chord name */
  #chord-name-wrap {
    flex: 0 0 15%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: env(safe-area-inset-top, 0);
  }
  #chord-name {
    font-size: clamp(80px, 22vw, 160px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fff;
    transition: transform 90ms cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
    text-shadow: 0 0 24px rgba(255,255,255,0.08);
  }
  #chord-name.hit { transform: scale(1.1); }

  /* Middle: guitar visual */
  #guitar-wrap {
    flex: 1 1 60%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #guitar {
    width: 100%;
    height: 100%;
    display: block;
  }
  #flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(255,180,80,0.35) 0%, transparent 60%);
    transition: opacity 180ms ease-out;
    will-change: opacity;
  }
  #flash.up { background: radial-gradient(ellipse at center, rgba(200,230,255,0.32) 0%, transparent 60%); }

  /* Bottom: chord selector */
  #chord-bar {
    flex: 0 0 25%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 10px;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #chord-bar::-webkit-scrollbar { display: none; }
  .chord-btn {
    flex: 0 0 auto;
    min-width: 64px;
    height: 64px;
    padding: 0 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    background: var(--surface);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 100ms ease, background 160ms ease, box-shadow 160ms ease;
    cursor: pointer;
  }
  .chord-btn:active { transform: scale(0.94); }
  .chord-btn.active {
    background: var(--accent);
    box-shadow: 0 0 24px rgba(233, 30, 140, 0.45), inset 0 0 0 1px rgba(255,255,255,0.15);
  }
  .chord-btn.pattern-btn {
    background: linear-gradient(135deg, #2a1838 0%, #1a1a2e 100%);
    color: #c8a850;
    letter-spacing: 0.12em;
    font-size: 14px;
    padding: 0 14px;
  }
  .chord-btn.pattern-btn.active {
    background: linear-gradient(135deg, #c8a850 0%, #e9b820 100%);
    color: #0a0a0f;
    box-shadow: 0 0 24px rgba(200,168,80,0.55), inset 0 0 0 1px rgba(0,0,0,0.15);
  }

  /* Start overlay */
  #start-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #14141f 0%, #07070b 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    flex-direction: column;
    gap: 18px;
  }
  #start-overlay h1 {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #fff 0%, #c8a850 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #start-overlay p {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
  }
  #start-btn {
    padding: 18px 40px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    box-shadow: 0 10px 40px rgba(233, 30, 140, 0.4);
    cursor: pointer;
  }
  #start-btn:active { transform: scale(0.97); }
  .hidden { display: none !important; }

  /* Calibration overlay */
  #calib {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 15, 0.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 40;
    padding: 24px;
    text-align: center;
  }
  #calib .step { font-size: 28px; font-weight: 700; }
  #calib .hint { font-size: 14px; color: rgba(255,255,255,0.5); max-width: 280px; }
  #calib .timer {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Hidden sensitivity panel */
  #sens-panel {
    position: absolute;
    top: 16%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 30, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 14px 20px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 30;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 240px;
  }
  #sens-panel label { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; text-transform: uppercase; }
  #sens-panel input[type=range] { width: 100%; accent-color: var(--accent); }
  #sens-panel .row { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.45); }

  /* Palm mute indicator */
  #mute-indicator {
    position: absolute;
    top: calc(16% + 12px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 220ms ease;
    pointer-events: none;
  }
  #mute-indicator.on { opacity: 1; color: #ff8a4c; }

  /* Motion status dot */
  #motion-dot {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    right: 12px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background 80ms ease, transform 80ms ease;
    z-index: 25;
    pointer-events: none;
  }
  #motion-dot.live { background: #2bd47a; }
  #motion-dot.hit { background: #ffcc4c; transform: scale(1.8); }

  #debug-readout {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 6px);
    left: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    z-index: 25;
    pointer-events: none;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div id="app">
  <div id="chord-name-wrap">
    <div id="chord-name">G</div>
  </div>
  <div id="mute-indicator">PALM MUTE</div>
  <div id="motion-dot"></div>
  <div id="debug-readout">peak: 0.00 | thr: 0.30</div>
  <div id="guitar-wrap">
    <canvas id="guitar"></canvas>
    <div id="flash"></div>
  </div>
  <div id="chord-bar"></div>

  <div id="start-overlay">
    <h1>AirGig</h1>
    <p>Hold like a guitar neck. Strum your wrist.</p>
    <button id="start-btn">TAP TO START</button>
  </div>

  <div id="calib" class="hidden">
    <div class="step" id="calib-step">Hold still...</div>
    <div class="timer"></div>
    <div class="hint" id="calib-hint">Keep the phone still for 2 seconds.</div>
  </div>

  <div id="sens-panel" class="hidden">
    <label>SENSITIVITY</label>
    <input type="range" id="sens-slider" min="0.3" max="6.0" step="0.05" value="1.4" />
    <div class="row"><span>SUBTLE</span><span>STRONG</span></div>
  </div>
</div>

<script>
/* ============================================================
   AIR-GIG — Strum Experience Prototype
   ============================================================ */

const NOTE = {
  'E2':82.41,'F2':87.31,'F#2':92.50,'G2':98.00,'G#2':103.83,'A2':110.00,
  'A#2':116.54,'B2':123.47,'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,
  'E3':164.81,'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,
  'A#3':233.08,'B3':246.94,'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,
  'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00
};

const CHORDS = {
  G:  ['G2','B2','D3','G3','B3','G4'],
  C:  ['x', 'C3','E3','G3','C4','E4'],
  D:  ['x', 'x', 'D3','A3','D4','F#4'],
  Em: ['E2','B2','E3','G3','B3','E4'],
  Am: ['x', 'A2','E3','A3','C4','E4'],
  E:  ['E2','G#2','B2','E3','G#3','B3'],
  A:  ['x', 'A2','E3','A3','C#4','E4'],
  F:  ['F2','C3','F3','A3','C4','F4'],
  Dm: ['x', 'x', 'D3','A3','D4','F4'],
  Bm: ['x', 'B2','D3','F#3','B3','D4'],
  // Power chords for pattern mode (root, 5th, octave on bottom 3 strings)
  F5:  ['F2','C3','F3','x','x','x'],
  Bb5: ['A#2','F3','A#3','x','x','x'],
  Ab5: ['G#2','D#3','G#3','x','x','x'],
  Db5: ['C#3','G#3','C#4','x','x','x'],
};
const CHORD_ORDER = ['G','C','D','Em','Am','E','A','F','Dm','Bm'];
const PATTERN = ['F5','Bb5','Ab5','Db5'];

let state = {
  ctx: null,
  master: null,
  reverbWet: null,
  reverbDry: null,
  comp: null,
  bodyEQ: null,
  currentChord: 'G',
  activeVoices: [],
  sensitivity: 1.4,
  upSensitivity: 4.5,
  noiseFloor: 0,
  calibratedPeak: 4.0,
  lastStrumTime: 0,
  palmMute: false,
  motionEnabled: false,
  patternMode: false,
  patternIndex: 0,
};

/* ===== AUDIO GRAPH =====
   The AudioContext itself is created synchronously inside the start() gesture
   handler (required by iOS Safari). This function builds the rest of the graph. */
async function finishAudioGraph() {
  const ctx = state.ctx;

  // Master chain: voices -> bodyEQ -> compressor -> [dry + reverb] -> destination
  const master = ctx.createGain();
  master.gain.value = 0.8;

  // Body EQ chain
  const lowBody = ctx.createBiquadFilter();
  lowBody.type = 'peaking'; lowBody.frequency.value = 100; lowBody.Q.value = 0.7; lowBody.gain.value = 5;
  const midBody = ctx.createBiquadFilter();
  midBody.type = 'peaking'; midBody.frequency.value = 220; midBody.Q.value = 0.8; midBody.gain.value = 4;
  const air = ctx.createBiquadFilter();
  air.type = 'highshelf'; air.frequency.value = 3200; air.gain.value = 1.5;
  const tame = ctx.createBiquadFilter();
  tame.type = 'lowpass'; tame.frequency.value = 8000; tame.Q.value = 0.5;

  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.18; comp.knee.value = 6;

  // Reverb
  const conv = ctx.createConvolver();
  conv.buffer = makeImpulseResponse(ctx, 0.9, 2.4);
  const wet = ctx.createGain(); wet.gain.value = 0.18;
  const dry = ctx.createGain(); dry.gain.value = 1.0;

  master.connect(lowBody).connect(midBody).connect(air).connect(tame).connect(comp);
  comp.connect(dry).connect(ctx.destination);
  comp.connect(conv).connect(wet).connect(ctx.destination);

  state.master = master;
  state.reverbWet = wet;
  state.reverbDry = dry;
  state.comp = comp;
}

function makeImpulseResponse(ctx, durationSec, decay) {
  const rate = ctx.sampleRate;
  const len = Math.floor(rate * durationSec);
  const ir = ctx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
    }
  }
  return ir;
}

/* ===== STRING SYNTHESIS =====
   Combination of additive partials with inharmonic stretch + noise pick attack.
   Karplus-Strong-flavored damping via per-partial decay; cheaper than a real KS loop and works reliably on iOS Safari. */
function playString(freq, intensity, isUp, panValue, isMuted, stringIndex, totalStrings, sustainMult = 1.0) {
  const ctx = state.ctx;
  const now = ctx.currentTime;

  if (isMuted || freq === null) {
    // muted "x" string -> short percussive thump
    playPickClick(0.6 * intensity, isUp, panValue, true);
    return null;
  }

  const voice = ctx.createGain();
  voice.gain.value = 0;
  const pan = ctx.createStereoPanner();
  pan.pan.value = panValue;

  // Micro-detune ±3 cents
  const detune = (Math.random() * 6 - 3);
  const freqAdj = freq * Math.pow(2, detune / 1200);

  // Per-string highpass to thin upstrokes slightly
  const tone = ctx.createBiquadFilter();
  tone.type = 'lowpass';
  // brighter for harder strums; up strokes a touch brighter
  const cutoff = 1800 + intensity * 5200 + (isUp ? 600 : 0);
  tone.frequency.value = Math.min(cutoff, 9500);
  tone.Q.value = 0.4;

  // Build partials (additive)
  const partials = [];
  const numPartials = 8;
  const baseSustain = isMuted ? 0.18 : (2.5 + intensity * 1.0); // 2.5–3.5s
  // Higher strings decay faster: stringIndex 0 = low E (slow), 5 = high E (fast)
  const decayScale = 1.0 - (stringIndex / totalStrings) * 0.45;
  const sustain = baseSustain * decayScale * (isMuted ? 1.0 : sustainMult);

  for (let p = 1; p <= numPartials; p++) {
    const inh = 1 + (p * p) * 0.00035;
    const partialFreq = freqAdj * p * inh;
    if (partialFreq > ctx.sampleRate * 0.45) continue;

    const osc = ctx.createOscillator();
    osc.type = p === 1 ? 'triangle' : 'sine';
    osc.frequency.value = partialFreq;

    const g = ctx.createGain();
    // Amplitude rolloff per partial
    const partialAmp = 1 / Math.pow(p, 1.35);
    // Upstroke emphasizes upper partials slightly
    const upBoost = isUp ? (1 + (p - 1) * 0.05) : 1;
    const targetAmp = partialAmp * upBoost * 0.35;

    // Each partial gets its own decay (higher = faster)
    const partialDecay = sustain / Math.pow(p, 0.55);

    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(targetAmp, now + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(0.05, partialDecay));

    osc.connect(g).connect(tone);
    osc.start(now);
    osc.stop(now + partialDecay + 0.1);
    partials.push({ osc, g });
  }

  // Envelope
  const peakGain = (isMuted ? 0.25 : 0.85) * (isUp ? 0.8 : 1.0) * (0.45 + intensity * 0.7);
  voice.gain.setValueAtTime(0, now);
  voice.gain.linearRampToValueAtTime(peakGain, now + 0.005);
  // Natural overall decay
  voice.gain.exponentialRampToValueAtTime(0.0001, now + sustain);

  tone.connect(voice).connect(pan).connect(state.master);

  const voiceObj = {
    voice, pan, partials, endTime: now + sustain + 0.1,
    stop(fadeSec = 0.015) {
      const t = state.ctx.currentTime;
      try {
        voice.gain.cancelScheduledValues(t);
        voice.gain.setValueAtTime(voice.gain.value, t);
        voice.gain.linearRampToValueAtTime(0.0001, t + fadeSec);
      } catch(e) {}
      for (const p of partials) {
        try { p.osc.stop(t + fadeSec + 0.02); } catch(e) {}
      }
    }
  };
  return voiceObj;
}

function playPickClick(intensity, isUp, panValue, muted = false) {
  const ctx = state.ctx;
  const now = ctx.currentTime;
  const durSec = (muted ? 0.06 : 0.012) + intensity * 0.004;
  const bufLen = Math.floor(ctx.sampleRate * durSec);
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) {
    const t = i / bufLen;
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, muted ? 1.5 : 2);
  }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const hp = ctx.createBiquadFilter();
  hp.type = muted ? 'lowpass' : 'highpass';
  hp.frequency.value = muted ? 240 : (1600 + intensity * 1800 + (isUp ? 400 : 0));
  hp.Q.value = 0.7;
  const g = ctx.createGain();
  g.gain.value = (muted ? 0.7 : 0.32) * (0.5 + intensity * 0.8);
  const pan = ctx.createStereoPanner();
  pan.pan.value = panValue;
  src.connect(hp).connect(g).connect(pan).connect(state.master);
  src.start(now);
  src.stop(now + durSec + 0.02);
}

/* ===== STRUM ENGINE =====
   direction: +1 down, -1 up
   intensity: 0..1 (peak magnitude / calibratedPeak)
   riseDurationMs: how long the gesture took to build (15–450ms typical)
   gestureEnergy: integrated motion magnitude (proxy for total work done) */
function strum(direction, intensity, riseDurationMs = 60, gestureEnergy = 1) {
  if (!state.ctx) return;
  intensity = Math.max(0, Math.min(1, intensity));

  // Pattern mode: advance chord BEFORE we play it so the new chord rings out.
  advancePatternIfActive(direction);

  // Cut previous chord cleanly
  cutPreviousVoices(0.015);

  const isUp = direction < 0;
  const chord = CHORDS[state.currentChord];

  // Map rise duration to total sweep duration. Curve is gentle on fast end,
  // steeper on slow end so slow gestures really stretch the strum out.
  // 15ms rise  → ~12ms sweep   (~2ms gap, snappy)
  // 80ms rise  → ~70ms sweep   (~12ms gap, natural)
  // 250ms rise → ~280ms sweep  (~47ms gap, deliberate)
  // 600ms rise → ~520ms sweep  (~87ms gap, slow drag — clear arpeggio feel)
  const riseNorm = Math.min(1, Math.max(0, (riseDurationMs - 15) / (600 - 15)));
  const riseCurve = Math.pow(riseNorm, 0.75); // bias toward stretching slow gestures
  let totalSweepMs = 12 + riseCurve * 510; // 12ms..522ms
  totalSweepMs *= (1.0 - intensity * 0.15); // harder = slightly tighter
  const stringGapSec = (totalSweepMs / 6) / 1000;

  const ctx = state.ctx;
  const startTime = ctx.currentTime;
  const muted = state.palmMute;

  // Order: down = low to high (0->5), up = high to low (5->0)
  const order = isUp ? [5, 4, 3, 2, 1, 0] : [0, 1, 2, 3, 4, 5];

  // Sustain scaling — every gesture component contributes:
  //   intensity (peak velocity)  → fast = longer ring (pick energy transfer)
  //   gestureEnergy (integrated) → more total motion = more accumulated ring
  //   riseDuration               → longer gesture = longer ring
  // Short fast strums get heavy intensity boost so they ring out properly
  // instead of feeling clipped.
  const energyNorm = Math.min(1, gestureEnergy / 80);
  const riseSustainBoost = Math.min(1, riseDurationMs / 400);
  const speedSustainBoost = Math.pow(intensity, 0.7); // emphasizes mid-high speeds
  const sustainMult =
    1.0 +
    speedSustainBoost * 1.4 +       // 0..1.4 from speed alone
    energyNorm * 1.0 +              // 0..1.0 from total motion
    riseSustainBoost * 0.6;         // 0..0.6 from gesture length
  // range ≈ 1.0..4.0 — short fast flicks now ring ~2.4×, slow heavy ~4×

  const fireString = (stringIdx) => {
    const noteName = chord[stringIdx];
    const isMutedNote = noteName === 'x';
    const freq = isMutedNote ? null : NOTE[noteName];
    const gainJitter = 0.95 + Math.random() * 0.1;
    const stringIntensity = intensity * gainJitter;
    const panValue = -0.15 + (stringIdx / 5) * 0.30;
    playPickClick(stringIntensity * 0.55, isUp, panValue, muted);
    const v = playString(
      freq, stringIntensity, isUp, panValue,
      isMutedNote || muted, stringIdx, 6, sustainMult
    );
    if (v) state.activeVoices.push(v);
    triggerStringVisual(stringIdx, stringIntensity, isUp);
  };

  // Fire first string SYNCHRONOUSLY so audio starts on this JS tick — zero
  // setTimeout latency for the leading note. Remaining strings stagger.
  fireString(order[0]);
  for (let seq = 1; seq < order.length; seq++) {
    const stringIdx = order[seq];
    const jitterRange = Math.max(0.0008, stringGapSec * 0.25);
    const jitterSec = (Math.random() * 2 - 1) * jitterRange;
    const delayMs = Math.max(0, (seq * stringGapSec + jitterSec) * 1000);
    setTimeout(() => fireString(stringIdx), delayMs);
  }

  // Lead pick click — sharper on fast strums, softer on slow ones
  const leadClickIntensity = intensity * (0.6 + (1 - riseNorm) * 0.4);
  playPickClick(leadClickIntensity, isUp, isUp ? 0.15 : -0.15, muted);

  if (navigator.vibrate) {
    navigator.vibrate(intensity > 0.7 ? 18 : 12);
  }

  flashGuitar(isUp, intensity);
  chordNameHit();

  state.lastStrumTime = performance.now();
}

function cutPreviousVoices(fadeSec) {
  const now = state.ctx.currentTime;
  for (const v of state.activeVoices) {
    if (v && v.endTime > now) v.stop(fadeSec);
  }
  // Trim ended voices
  state.activeVoices = state.activeVoices.filter(v => v && v.endTime > now);
}

/* ===== MOTION DETECTION ===== */
const motion = {
  ema: 0,
  history: [], // {t, v}
  lastFireT: 0,
  lastDeltaY: 0,
  lastDeltaZ: 0,
  lastBeta: 0,
  lastGamma: 0,
  baseline: 0,
  armed: true,
  gestureStartT: 0,
  gestureStartV: 0,
  gesturePeakMag: 0,
  gestureEnergy: 0,
};

function onDeviceMotion(e) {
  const acc = e.accelerationIncludingGravity || e.acceleration;
  const accLin = e.acceleration; // gravity removed (when available)
  const rot = e.rotationRate || {};
  if (!acc && !rot) return;

  // Show motion is live
  const dot = document.getElementById('motion-dot');
  if (dot && !dot.classList.contains('live')) dot.classList.add('live');

  const ay = acc ? (acc.y || 0) : 0;
  const az = acc ? (acc.z || 0) : 0;
  const deltaY = ay - motion.lastBeta;
  const deltaZ = az - motion.lastGamma;
  motion.lastBeta = ay;
  motion.lastGamma = az;

  const betaRate = (rot.beta || 0);
  const gammaRate = (rot.gamma || 0);
  const alphaRate = (rot.alpha || 0);

  // Combine rotation + acceleration deltas. Use linear accel when available.
  const linY = accLin ? (accLin.y || 0) : deltaY * 4;
  const linZ = accLin ? (accLin.z || 0) : deltaZ * 4;

  const signedVelocity =
    (betaRate / 120) +
    (gammaRate / 160) +
    (linY / 4) -
    (linZ / 6) +
    (alphaRate / 240);

  // Light smoothing — keeps response snappy while filtering jitter
  motion.ema = motion.ema * 0.12 + signedVelocity * 0.88;

  const now = performance.now();
  motion.history.push({ t: now, v: motion.ema });
  // Keep last 8 samples regardless of time gap
  while (motion.history.length > 8) motion.history.shift();

  // Palm mute via orientation: detect screen-down tilt (acc.z strongly negative when phone face-down)
  // approximate: when acceleration along z exceeds ~5 (face up gives ~ -9.8 on iOS; face down ~ +9.8)
  const zVal = acc.z || 0;
  const tiltMute = zVal > 5; // ~30°+ tilted forward (screen facing down)
  if (tiltMute !== state.palmMute) {
    state.palmMute = tiltMute;
    document.getElementById('mute-indicator').classList.toggle('on', tiltMute);
  }

  detectStrum();
}

function detectStrum() {
  if (motion.history.length < 3) return;
  const last = motion.history[motion.history.length - 1];
  const prev = motion.history[motion.history.length - 2];
  const prev2 = motion.history[motion.history.length - 3];
  const now = performance.now();

  // Direction-aware cooldown: reversals fire immediately; same-direction needs cooldown.
  const lastDir = motion.lastFireDir || 0;
  const curDir = Math.sign(last.v);
  const reversing = curDir !== 0 && lastDir !== 0 && curDir !== lastDir;
  const cooldownMs = reversing ? 0 : 130;
  if (now - motion.lastFireT < cooldownMs) return;

  // Debounce: only blocks SAME-direction re-fires. Reversal always allowed.
  if (motion.armed === false && !reversing) {
    if (Math.abs(last.v) < state.sensitivity * 0.4) {
      motion.armed = true;
    } else {
      return;
    }
  }
  if (reversing) motion.armed = true;

  // Track gesture start: first sample of this direction that exceeded 30% threshold
  const riseThresh = state.sensitivity * 0.3;
  const dirSignNow = Math.sign(last.v);
  if (dirSignNow !== 0 && Math.abs(last.v) > riseThresh) {
    if (motion.gestureStartT === 0 || Math.sign(motion.gestureStartV) !== dirSignNow) {
      motion.gestureStartT = last.t;
      motion.gestureStartV = last.v;
      motion.gesturePeakMag = Math.abs(last.v);
      motion.gestureEnergy = 0;
    }
    motion.gesturePeakMag = Math.max(motion.gesturePeakMag, Math.abs(last.v));
    motion.gestureEnergy += Math.abs(last.v);
  }

  // Per-direction threshold: downstrokes use sensitivity, upstrokes need to clear
  // upSensitivity. Lets users reset their hand upward without triggering an upstrum.
  const thresholdFor = (v) => v > 0 ? state.sensitivity : state.upSensitivity;

  // Strategy 0 — rising edge: signal just crossed threshold. Fires the strum
  // at the FIRST sample over threshold. No "baseline-quiet" check — that
  // history scan was the main source of perceived latency.
  let peakV = null;
  const thrLast = thresholdFor(last.v);
  if (Math.abs(last.v) >= thrLast && Math.abs(prev.v) < thrLast) {
    peakV = last.v;
  }

  // Strategy A — direction flip: sign changed between prev and last AND latest
  // sample is over threshold. Catches rapid down-up-down-up reversals.
  if (peakV === null &&
      Math.sign(last.v) !== 0 && Math.sign(prev.v) !== 0 &&
      Math.sign(last.v) !== Math.sign(prev.v) &&
      Math.abs(last.v) >= thrLast) {
    peakV = last.v;
  }

  // Strategy B — instant surge: latest sample is a sharp jump from previous.
  // Catches single-sample short flicks.
  if (peakV === null) {
    if (Math.abs(last.v) >= thrLast &&
        Math.abs(last.v) > Math.abs(prev.v) * 1.5 + thrLast * 0.25) {
      peakV = last.v;
    }
  }

  // Strategy C — classic peak: prev sample is a local extremum.
  if (peakV === null) {
    const dirNow = Math.sign(last.v - prev.v);
    const dirPrev = Math.sign(prev.v - prev2.v);
    if (dirNow !== dirPrev && dirPrev !== 0 && Math.abs(prev.v) >= thresholdFor(prev.v)) {
      peakV = prev.v;
    }
  }

  // Strategy D — wide surge: latest sample is big and baseline was quiet.
  if (peakV === null) {
    const thr = thresholdFor(last.v);
    const big = thr * 1.4;
    if (Math.abs(last.v) >= big) {
      const oldest = motion.history[Math.max(0, motion.history.length - 5)] || prev2;
      if (Math.abs(oldest.v) < thr * 0.5) {
        peakV = last.v;
      }
    }
  }

  if (peakV === null) return;

  motion.lastFireT = now;
  motion.lastFireDir = Math.sign(peakV);
  motion.armed = false;
  const direction = peakV > 0 ? 1 : -1;
  const mag = Math.abs(peakV);
  const intensity = Math.min(1, Math.max(0.25, mag / Math.max(state.calibratedPeak, 1.0)));

  // Measure gesture characteristics
  const riseDuration = motion.gestureStartT > 0
    ? Math.max(15, Math.min(450, now - motion.gestureStartT))
    : 60;
  const gestureEnergy = motion.gestureEnergy;

  // Reset gesture tracking — next motion starts fresh
  motion.gestureStartT = 0;
  motion.gestureStartV = 0;
  motion.gestureEnergy = 0;

  strum(direction, intensity, riseDuration, gestureEnergy);

  const dot = document.getElementById('motion-dot');
  if (dot) {
    dot.classList.add('hit');
    setTimeout(() => dot.classList.remove('hit'), 90);
  }
}

function onDeviceOrientation(e) {
  // Backup: derive a velocity-ish signal from orientation changes
  if (!state.motionEnabled) return;
  const b = e.beta || 0;
  const g = e.gamma || 0;
  if (!motion._ori) motion._ori = { b, g, t: performance.now() };
  const now = performance.now();
  const dt = Math.max(8, now - motion._ori.t);
  const db = (b - motion._ori.b) / dt * 50;
  const dg = (g - motion._ori.g) / dt * 50;
  motion._ori = { b, g, t: now };

  // Only inject if devicemotion hasn't been producing data
  if (!motion.history.length || now - motion.history[motion.history.length - 1].t > 80) {
    const sig = db + dg * 0.4;
    motion.ema = motion.ema * 0.3 + sig * 0.7;
    motion.history.push({ t: now, v: motion.ema });
    while (motion.history.length > 8) motion.history.shift();
    const dot = document.getElementById('motion-dot');
    if (dot && !dot.classList.contains('live')) dot.classList.add('live');
    detectStrum();
  }
}

/* ===== DEBUG READOUT ===== */
let _peakSeen = 0;
function startDebugReadout() {
  const el = document.getElementById('debug-readout');
  setInterval(() => {
    const v = Math.abs(motion.ema);
    if (v > _peakSeen) _peakSeen = v;
    // decay slowly
    _peakSeen *= 0.985;
    el.textContent = `peak: ${_peakSeen.toFixed(2)} | now: ${v.toFixed(2)} | thr: ${state.sensitivity.toFixed(2)}`;
  }, 80);
}

/* ===== TOUCH FALLBACK ===== */
function setupTouchFallback() {
  const target = document.getElementById('guitar-wrap');
  let startY = null, startT = 0;
  const begin = (y) => { startY = y; startT = performance.now(); };
  const end = (y) => {
    if (startY === null) return;
    const dy = y - startY;
    const dt = Math.max(1, performance.now() - startT);
    const speed = Math.abs(dy) / dt; // px/ms
    if (Math.abs(dy) < 14) { startY = null; return; }
    const intensity = Math.min(1, speed / 1.6);
    const direction = dy > 0 ? 1 : -1;
    strum(direction, Math.max(0.25, intensity));
    startY = null;
  };
  target.addEventListener('touchstart', (e) => begin(e.touches[0].clientY), { passive: true });
  target.addEventListener('touchend', (e) => end(e.changedTouches[0].clientY), { passive: true });
  target.addEventListener('mousedown', (e) => begin(e.clientY));
  target.addEventListener('mouseup', (e) => end(e.clientY));
}

/* ===== VISUALS ===== */
const canvas = document.getElementById('guitar');
const gctx = canvas.getContext('2d');
let DPR = Math.min(2, window.devicePixelRatio || 1);
let strings = []; // { y, vibAmp, vibPhase, hot }

function resizeCanvas() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  const wrap = document.getElementById('guitar-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  layoutStrings();
}
function layoutStrings() {
  const h = canvas.height;
  strings = [];
  const margin = h * 0.18;
  const usable = h - margin * 2;
  for (let i = 0; i < 6; i++) {
    strings.push({
      y: margin + (usable * (i / 5)),
      vibAmp: 0,
      vibPhase: 0,
      vibStart: 0,
      hot: 0,
    });
  }
}

function triggerStringVisual(idx, intensity, isUp) {
  const s = strings[idx];
  if (!s) return;
  s.vibAmp = 10 + intensity * 22;
  s.vibStart = performance.now();
  s.vibPhase = isUp ? Math.PI : 0;
  s.hot = 1;
}

function drawGuitar() {
  const w = canvas.width, h = canvas.height;
  gctx.clearRect(0, 0, w, h);

  // Sound hole
  const cx = w / 2, cy = h / 2;
  const holeR = Math.min(w, h) * 0.18;
  const grad = gctx.createRadialGradient(cx, cy, holeR * 0.2, cx, cy, holeR);
  grad.addColorStop(0, '#000');
  grad.addColorStop(0.6, '#08080d');
  grad.addColorStop(1, 'rgba(20,18,28,0.0)');
  gctx.fillStyle = grad;
  gctx.beginPath();
  gctx.ellipse(cx, cy, holeR, holeR * 1.05, 0, 0, Math.PI * 2);
  gctx.fill();

  // Rosette ring
  gctx.strokeStyle = 'rgba(200,168,80,0.18)';
  gctx.lineWidth = 2 * DPR;
  gctx.beginPath();
  gctx.ellipse(cx, cy, holeR * 1.12, holeR * 1.18, 0, 0, Math.PI * 2);
  gctx.stroke();

  // Strings
  const now = performance.now();
  for (let i = 0; i < strings.length; i++) {
    const s = strings[i];
    const baseThickness = (0.6 + (5 - i) * 0.4) * DPR;
    const age = (now - s.vibStart) / 1000;
    const lifetime = 0.5;
    let amp = 0;
    if (s.vibStart > 0 && age < lifetime) {
      amp = s.vibAmp * (1 - age / lifetime);
    } else {
      s.vibAmp = 0;
    }
    s.hot *= 0.92;

    const segments = 60;
    gctx.beginPath();
    for (let k = 0; k <= segments; k++) {
      const x = (k / segments) * w;
      const wave = Math.sin((k / segments) * Math.PI) * amp * Math.sin(age * 60 + s.vibPhase);
      const y = s.y + wave * DPR;
      if (k === 0) gctx.moveTo(x, y);
      else gctx.lineTo(x, y);
    }
    // Color: warm gold to hot white
    const heat = Math.min(1, s.hot + amp * 0.02);
    const r = Math.floor(200 + heat * 55);
    const gg = Math.floor(168 + heat * 87);
    const b = Math.floor(80 + heat * 175);
    gctx.strokeStyle = `rgba(${r},${gg},${b},${0.85})`;
    gctx.lineWidth = baseThickness;
    gctx.shadowBlur = heat * 12;
    gctx.shadowColor = `rgba(255,220,150,${heat * 0.6})`;
    gctx.stroke();
    gctx.shadowBlur = 0;
  }

  requestAnimationFrame(drawGuitar);
}

function flashGuitar(isUp, intensity) {
  const el = document.getElementById('flash');
  el.classList.toggle('up', isUp);
  el.style.opacity = (0.4 + intensity * 0.6).toFixed(2);
  // Fade out
  setTimeout(() => { el.style.opacity = '0'; }, 60);
}

function chordNameHit() {
  const el = document.getElementById('chord-name');
  el.classList.remove('hit');
  // restart animation
  void el.offsetWidth;
  el.classList.add('hit');
  setTimeout(() => el.classList.remove('hit'), 110);
}

/* ===== CHORD BAR ===== */
function buildChordBar() {
  const bar = document.getElementById('chord-bar');
  bar.innerHTML = '';

  // Pattern toggle (auto-cycles F5→Bb5→Ab5→Db5 on each downstrum)
  const pb = document.createElement('button');
  pb.className = 'chord-btn pattern-btn' + (state.patternMode ? ' active' : '');
  pb.textContent = 'PATTERN';
  pb.addEventListener('click', togglePattern);
  pb.addEventListener('touchstart', (e) => { e.preventDefault(); togglePattern(); }, { passive: false });
  bar.appendChild(pb);

  CHORD_ORDER.forEach((name) => {
    const b = document.createElement('button');
    b.className = 'chord-btn' + (name === state.currentChord && !state.patternMode ? ' active' : '');
    b.textContent = name;
    b.addEventListener('click', () => selectChord(name));
    b.addEventListener('touchstart', (e) => { e.preventDefault(); selectChord(name); }, { passive: false });
    bar.appendChild(b);
  });
}
function selectChord(name) {
  // Manually picking a chord disables pattern mode
  if (state.patternMode) {
    state.patternMode = false;
    document.querySelector('.pattern-btn')?.classList.remove('active');
  }
  state.currentChord = name;
  document.getElementById('chord-name').textContent = name;
  document.querySelectorAll('.chord-btn').forEach((el) => {
    if (el.classList.contains('pattern-btn')) return;
    el.classList.toggle('active', el.textContent === name);
  });
}
function togglePattern() {
  state.patternMode = !state.patternMode;
  const btn = document.querySelector('.pattern-btn');
  btn.classList.toggle('active', state.patternMode);
  if (state.patternMode) {
    state.patternIndex = 0;
    setCurrentChordSilently(PATTERN[0]);
    // Clear highlight from regular chord buttons
    document.querySelectorAll('.chord-btn').forEach((el) => {
      if (el.classList.contains('pattern-btn')) return;
      el.classList.remove('active');
    });
  }
}
function setCurrentChordSilently(name) {
  state.currentChord = name;
  document.getElementById('chord-name').textContent = name;
}
function advancePatternIfActive(direction) {
  // Advance on downstrums only (direction === 1). Upstrums keep the current chord.
  if (!state.patternMode || direction !== 1) return;
  state.patternIndex = (state.patternIndex + 1) % PATTERN.length;
  setCurrentChordSilently(PATTERN[state.patternIndex]);
}

/* ===== CALIBRATION ===== */
async function runCalibration() {
  if (!state.motionEnabled) return; // skip calibration if no sensors
  const overlay = document.getElementById('calib');
  const step = document.getElementById('calib-step');
  const hint = document.getElementById('calib-hint');
  overlay.classList.remove('hidden');

  // Phase 1: noise floor (2s still)
  step.textContent = 'Hold still...';
  hint.textContent = 'Keep the phone still for 2 seconds.';
  const stillSamples = [];
  const stillEnd = performance.now() + 2000;
  const stillHandler = () => stillSamples.push(Math.abs(motion.ema));
  const stillTimer = setInterval(stillHandler, 30);
  await new Promise((res) => setTimeout(res, 2000));
  clearInterval(stillTimer);
  stillSamples.sort((a,b)=>a-b);
  const noiseFloor = stillSamples[Math.floor(stillSamples.length * 0.9)] || 0.05;
  state.noiseFloor = noiseFloor;

  // Phase 2: typical strums (3s)
  step.textContent = 'Now strum!';
  hint.textContent = 'Make a few natural strums for 3 seconds.';
  const peaks = [];
  const peakTimer = setInterval(() => peaks.push(Math.abs(motion.ema)), 25);
  await new Promise((res) => setTimeout(res, 3000));
  clearInterval(peakTimer);
  peaks.sort((a,b)=>b-a);
  const topN = Math.min(10, peaks.length);
  const peakAvg = topN > 0 ? peaks.slice(0, topN).reduce((a,b)=>a+b, 0) / topN : 0;

  // If we saw real motion, calibrate; otherwise keep generous defaults so it works
  if (peakAvg > 0.5) {
    state.calibratedPeak = Math.max(1.5, peakAvg);
    state.sensitivity = Math.max(0.3, Math.min(2.0, peakAvg * 0.3));
  } else {
    // No clear strum motion detected — leave permissive defaults
    state.calibratedPeak = 3.0;
    state.sensitivity = 0.6;
  }
  document.getElementById('sens-slider').value = state.sensitivity;

  overlay.classList.add('hidden');
}

/* ===== HIDDEN SENSITIVITY PANEL ===== */
function setupSensitivityPanel() {
  const name = document.getElementById('chord-name');
  const panel = document.getElementById('sens-panel');
  const slider = document.getElementById('sens-slider');
  let taps = 0, lastTap = 0;
  name.addEventListener('click', () => {
    const now = performance.now();
    if (now - lastTap > 500) taps = 0;
    lastTap = now;
    taps++;
    if (taps >= 3) {
      panel.classList.toggle('hidden');
      taps = 0;
    }
  });
  slider.addEventListener('input', () => {
    state.sensitivity = parseFloat(slider.value);
  });
}

/* ===== INIT ===== */
async function start() {
  // CRITICAL: on iOS Safari, both DeviceMotionEvent.requestPermission() AND
  // AudioContext creation must happen synchronously inside the user-gesture
  // handler. Don't await anything before these calls.

  // 1. Create AudioContext synchronously (iOS requires this in the gesture).
  const AC = window.AudioContext || window.webkitAudioContext;
  state.ctx = new AC({ latencyHint: 'interactive' });

  // 2. Fire the motion permission request synchronously (returns a promise).
  let motionPromise = null;
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    motionPromise = DeviceMotionEvent.requestPermission();
  }
  // Same for orientation on iOS 13+
  let orientPromise = null;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    orientPromise = DeviceOrientationEvent.requestPermission();
  }

  // Hide overlay now that the gesture-critical work is queued.
  document.getElementById('start-overlay').classList.add('hidden');

  // 3. Resume context (also needs gesture credit on iOS).
  if (state.ctx.state === 'suspended') {
    try { await state.ctx.resume(); } catch (e) {}
  }

  // 4. Build the rest of the audio graph.
  await finishAudioGraph();

  buildChordBar();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  requestAnimationFrame(drawGuitar);
  setupTouchFallback();
  setupSensitivityPanel();

  // 5. Resolve motion/orientation permission and wire up listeners.
  let motionGranted = true;
  try {
    if (motionPromise) {
      const r = await motionPromise;
      motionGranted = (r === 'granted');
    }
    if (orientPromise) {
      await orientPromise; // ignore result; orientation is non-critical
    }
  } catch (e) { motionGranted = false; }

  if (motionGranted) {
    window.addEventListener('devicemotion', onDeviceMotion, { passive: true });
    window.addEventListener('deviceorientation', onDeviceOrientation, { passive: true });
    state.motionEnabled = true;
  } else {
    // Permission denied — still works via touch fallback
    const readout = document.getElementById('debug-readout');
    if (readout) readout.textContent = 'Motion denied — use touch';
  }

  state.sensitivity = 1.4;
  state.upSensitivity = 4.5;
  state.calibratedPeak = 4.0;
  document.getElementById('sens-slider').value = state.sensitivity;
  startDebugReadout();
  // Register SW
  if ('serviceWorker' in navigator) {
    try { navigator.serviceWorker.register('/sw.js'); } catch (e) {}
  }
}

document.getElementById('start-btn').addEventListener('click', start);
// Allow tapping anywhere on overlay
document.getElementById('start-overlay').addEventListener('click', start);

// Prevent iOS scrolling/zoom
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>
